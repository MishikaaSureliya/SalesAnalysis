name: .NET CI/CD

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --configuration Release --no-restore

    - name: Publish project
      run: dotnet publish -c Release -o publish

    - name: Stop IIS App Pool
      shell: powershell
      run: |
        Import-Module WebAdministration
        if (Get-WebAppPoolState -Name "SalesPrediction" -ErrorAction SilentlyContinue) {
            Stop-WebAppPool -Name "SalesPrediction"
        }

    - name: Clean IIS Folder
      shell: powershell
      run: |
        if (Test-Path "C:\inetpub\wwwroot\SalesPrediction") {
            Get-ChildItem "C:\inetpub\wwwroot\SalesPrediction" -Recurse -Force | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
        }

    - name: Copy Files to IIS
      shell: powershell
      run: |
        Copy-Item -Path "publish\*" -Destination "C:\inetpub\wwwroot\SalesPrediction" -Recurse -Force

    - name: Start IIS App Pool
      shell: powershell
      run: |
        Import-Module WebAdministration
        Start-WebAppPool -Name "SalesPrediction"
