name: Deploy SalesAnalysis to IIS

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build
      run: dotnet build SalesAnalysis/SalesAnalysis.csproj --configuration Release

    - name: Publish
      run: dotnet publish SalesAnalysis/SalesAnalysis.csproj -c Release -o SalesAnalysis/publish

    - name: Deploy to IIS
      run: |
        xcopy SalesAnalysis\publish C:\inetpub\wwwroot\SalesPrediction /E /I /Y
        iisreset
