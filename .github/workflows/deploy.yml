name: .NET CI/CD

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --configuration Release --no-restore

    - name: Publish project
      run: dotnet publish -c Release -o publish

    - name: Ensure IIS Folder Exists
      shell: powershell
      run: |
        if (!(Test-Path "C:\inetpub\wwwroot\SalesPrediction")) {
            New-Item -ItemType Directory -Path "C:\inetpub\wwwroot\SalesPrediction"
        }

    - name: Clean IIS Folder
      shell: powershell
      run: |
        if (Test-Path "C:\inetpub\wwwroot\SalesPrediction") {
            Get-ChildItem "C:\inetpub\wwwroot\SalesPrediction" -Recurse -Force | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
        }

    - name: Copy Files to IIS
      shell: powershell
      run: |
        Copy-Item -Path "publish\*" -Destination "C:\inetpub\wwwroot\SalesPrediction" -Recurse -Force
