name: Build and Deploy to IIS

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Build Project
      run: dotnet build --configuration Release

    - name: Publish Project
      run: dotnet publish -c Release -o publish

    - name: Deploy to IIS
      run: |
        iisreset /stop
        robocopy publish C:\inetpub\wwwroot\SalesPrediction /E /MIR /R:1 /W:1
        iisreset /start
