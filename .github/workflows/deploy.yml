name: Build and Deploy to IIS

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Project
      run: dotnet build --configuration Release

    - name: Publish Project
      run: dotnet publish -c Release -o publish

    - name: Deploy to IIS
      run: robocopy publish C:\inetpub\wwwroot\SalesPrediction /E /MIR /R:1 /W:1
