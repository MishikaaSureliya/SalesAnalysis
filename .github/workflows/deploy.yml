name: .NET CI/CD

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --configuration Release --no-restore

    - name: Publish project
      run: dotnet publish -c Release -o publish

    - name: Enable app_offline
      shell: powershell
      run: |
        New-Item "C:\inetpub\wwwroot\SalesPrediction\app_offline.htm" -ItemType File -Force

    - name: Clean IIS Folder
      shell: powershell
      run: |
        Get-ChildItem "C:\inetpub\wwwroot\SalesPrediction" -Recurse -Exclude "app_offline.htm" | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue

    - name: Copy Files to IIS
      shell: powershell
      run: |
        Copy-Item -Path "publish\*" -Destination "C:\inetpub\wwwroot\SalesPrediction" -Recurse -Force

    - name: Disable app_offline
      shell: powershell
      run: |
        Remove-Item "C:\inetpub\wwwroot\SalesPrediction\app_offline.htm" -Force
